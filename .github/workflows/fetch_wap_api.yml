name: 3. Fetch WAP API for 980080

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch WAP API
        run: python3 scripts/fetch_wap_api.py

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add results/wap_api/
          git diff --cached --quiet || git commit -m "chore: fetch wap api $(date +'%Y-%m-%d')"
          git push
