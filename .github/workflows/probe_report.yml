name: 2. Probe All Report Fields

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["1. Discover EastMoney Report Names"]
    types:
      - completed

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Probe all reports
        run: python3 scripts/probe_report.py

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add results/report_fields/
          git diff --cached --quiet || git commit -m "chore: probe all reports $(date +'%Y-%m-%d')"
          git push
